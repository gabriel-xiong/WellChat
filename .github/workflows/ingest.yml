name: Re-ingest website

on:
  schedule:
    - cron: "0 12 * * *" # Daily at 12:00 UTC
  workflow_dispatch: # Manual runs always ingest

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check whether ingest is due
        id: due
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(curl -fsS \
            "$SUPABASE_URL/rest/v1/documents?select=last_indexed_at&order=last_indexed_at.desc&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" |
            jq -r '.[0].last_indexed_at // empty')

          if [ -z "$latest" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          now=$(date +%s)
          last=$(date -d "$latest" +%s)

          if [ $((now - last)) -ge 432000 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.due.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.due.outputs.run == 'true'
        run: npm ci

      - name: Run ingestion
        if: steps.due.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_SITE_URL: https://thewellaustin.com
        run: npx tsx scripts/ingest.ts